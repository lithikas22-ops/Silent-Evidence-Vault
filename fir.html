<!DOCTYPE html>
<html>
<head>
    <title>Cyber Crime FIR</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Cyber Crime FIR Form</h2>

    <form action="report.html">
        <label>Name</label>
        <input type="text" required>

        <label>Age</label>
        <input type="number" required>

        <label>Gender</label>
        <select>
            <option>Male</option>
            <option>Female</option>
        </select>

        <label>Phone Number</label>
        <input type="text">

        <label>Email</label>
        <input type="email">

        <label>Type of Cyber Crime</label>
        <select>
            <option>Hacking</option>
            <option>Online Fraud</option>
            <option>Identity Theft</option>
            <option>Cyber Bullying</option>
        </select>

        <label>Incident Description</label>
        <textarea></textarea>

        <button type="submit">Generate Report</button>
    </form>
</div>

</body>
</html>
